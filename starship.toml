"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
palette = 'gruvbox_dark'

format = """
$username\
$directory\
[\ue0b0](fg:color_bg2 bg:color_aqua)\
$git_branch\
$git_commit\
[\ue0b0](fg:color_aqua bg:color_blue)\
$git_status\
$git_state\
[\ue0b0](fg:color_blue)\
$character\
"""

right_format = """
([\ue0be](fg:color_bg1)\
$cmd_duration\
[\ue0bc](fg:color_bg1))\
"""

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_fg1 = '#ebdbb2'
color_fg2 = '#d5c4a1'
color_fg3 = '#bdae93'
color_fg4 = '#a89984'

color_bg0 = '#282828'
color_bg1 = '#3c3836'
color_bg2 = '#504945'
color_bg3 = '#665c54'
color_bg4 = '#7c6f63'

color_blue = '#458588'
color_blue_bright = '#83a598'
color_aqua = '#689d6a'
color_green = '#98971a'
color_green_bright = '#b8bb26'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[username]
show_always = true
format = """
[ $user ](fg:color_fg0 bg:color_orange)\
[\ue0b0](fg:color_orange bg:color_bg2)"""

[directory]
truncate_to_repo = true
truncation_symbol = "\uf141/"

format = '[ $path ]($style)([$read_only ]($read_only_style))'
repo_root_format = """
([ $before_root_path]($before_repo_root_style))\
[$repo_root]($repo_root_style)\
[$path ]($style)([$read_only ]($read_only_style))"""

before_repo_root_style = 'fg:color_fg0 bg:color_bg2'
repo_root_style = 'bold fg:color_fg0 bg:color_bg2'
style = 'fg:color_fg0 bg:color_bg2'
read_only_style = 'fg:color_red bg:color_bg2'

[git_branch]
format = '[ $symbol$branch(:$remote_branch) ]($style)'
style = 'fg:color_fg0 bg:color_aqua'

[git_commit]
format = '[\($hash$tag\) ]($style)'
style = 'fg:color_fg0 bg:color_aqua'

[git_status]
format = '([ $all_status$ahead_behind ]($style))'
style = 'fg:color_fg0 bg:color_blue'

[git_state]
format = """
[\ue0bc](fg:color_blue bg:color_yellow)\
[ $state( $progress_current/$progress_total) ]($style)\
[\ue0bc](fg:color_yellow bg:color_blue)\
"""
style = 'bold fg:color_bg1 bg:color_yellow'

[character]
success_symbol = ""
error_symbol = """
[\ue0d7](fg:color_red)\
[ ERR ](bold fg:color_fg1 bg:color_red)\
[\ue0b0](fg:color_red)\
"""

[cmd_duration]
format = "[ \uf4e3 $duration ]($style)"
style = 'fg:color_fg4 bg:color_bg1'
