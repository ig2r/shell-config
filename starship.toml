"$schema" = 'https://starship.rs/config-schema.json'

palette = 'gruvbox_dark'
format = """
$directory\
[\ue0b0](fg:color_green bg:color_blue)\
$git_branch\
[\ue0b0](fg:color_blue bg:color_bg2)\
$git_state\
$git_status\
[\ue0b0](fg:color_bg2 bg:color_bg1)\
$cmd_duration\
$character\
"""

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_fg1 = '#ebdbb2'
color_fg2 = '#d5c4a1'
color_fg3 = '#bdae93'
color_bg0 = '#282828'
color_bg1 = '#3c3836'
color_bg2 = '#504945'
color_bg3 = '#665c54'
color_blue = '#458588'
color_blue_bright = '#83a598'
color_aqua = '#689d6a'
color_green = '#98971a'
color_green_bright = '#b8bb26'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[directory]
format = '[ $path ]($style)([$read_only ]($read_only_style))'
style = 'fg:color_fg0 bg:color_green'

# ([ $before_root_path ]($before_repo_root_style)[\ue0b0](fg:color_bg1 bg:color_green))\

repo_root_format = """
([ $before_root_path]($before_repo_root_style)[\ue0cc](fg:color_bg1 bg:color_green))\
[ $repo_root]($repo_root_style)\
[$path ]($style)([$read_only ]($read_only_style))"""
before_repo_root_style = 'fg:color_fg3 bg:color_bg1'
repo_root_style = 'bold fg:color_fg0 bg:color_green'

truncate_to_repo = false
# truncation_symbol = "…/"
truncation_symbol = "\uf141/"

[git_branch]
format = '[ $symbol$branch(:$remote_branch) ]($style)'
style = 'fg:color_fg0 bg:color_blue'

[git_status]
format = '([ $all_status$ahead_behind ]($style))'
style = 'bold fg:color_blue_bright bg:color_bg2'

[git_state]
format = """
[\ue0b0](fg:color_bg2 bg:color_purple)\
[ $state( $progress_current/$progress_total) ]($style)\
[\ue0b0](fg:color_purple bg:color_bg2)\
"""
style = 'fg:color_fg0 bg:color_purple'

[cmd_duration]
format = "[ \uf4e3 $duration ]($style)"
style = 'fg:color_fg0 bg:color_bg1'

[character]
success_symbol = "[\ue0b0](fg:color_bg1)"
error_symbol = """
[\ue0b0](fg:color_bg1 bg:color_red)\
[ ERR ](bold fg:color_fg1 bg:color_red)\
[\ue0b0](fg:color_red)"""
